<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Copilot Share</title>
	<meta name="theme-color" content="#f2ede7" />
	<meta name="application-name" content="Copilot Share" />
	<link rel="manifest" href="./pwa/manifest.webmanifest" />
	<link rel="icon" href="./icons/favicon.svg" type="image/svg+xml" />
	<link rel="stylesheet" href="./css/styles.css" />
	<link
		rel="stylesheet"
		href="./vendor/github-markdown.css"
		onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown.min.css';"
	/>
	<link
		rel="stylesheet"
		href="./vendor/highlight.github-dark.min.css"
		onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css';"
	/>
</head>
<body>
	<div class="app" id="app">
		<aside class="sidebar">
			<div class="copilot-share" id="copilotShareBox">
				<img src="./icons/favicon.svg" alt="Copilot Share" class="copilot-share-favicon" id="copilotShareFavicon" />
				<div class="copilot-share-header">
					<div class="copilot-share-meta">
						<div class="copilot-share-label">Copilot Share</div>
						<div class="dialog-subtitle" id="dialogSubtitle">Make Copilot Web for All</div>
					</div>
					<div class="copilot-share-actions">
						<button class="sidebar-toggle-btn" id="sidebarToggleBtn" type="button" aria-label="Collapse Sidebar" title="Collapse Sidebar">
							<span class="sidebar-toggle-icon" aria-hidden="true"></span>
						</button>
						<button class="primary-btn" id="newSessionBtn" type="button" aria-label="New Session" title="New Session">
							<span class="new-session-icon" aria-hidden="true"></span>
						</button>
						<button class="app-search-btn" id="appSearchBtn" type="button" aria-label="Search All Sessions" title="Search All Sessions">
							<span class="app-search-icon" aria-hidden="true"></span>
						</button>
						<div class="copilot-share-menu">
							<button
								class="copilot-share-menu-trigger"
								id="copilotShareMenuBtn"
								type="button"
								aria-haspopup="menu"
								aria-expanded="false"
								aria-controls="copilotShareMenu"
								aria-label="More Actions"
								title="More Actions"
							>
								<span class="copilot-share-menu-dots" aria-hidden="true"></span>
							</button>
							<div class="copilot-share-menu-popup" id="copilotShareMenu" role="menu" hidden>
								<button class="copilot-share-menu-item" id="shareAllSessionRawBtn" type="button" role="menuitem" aria-label="Share All Sessions" title="Share All Sessions">
									<span class="copilot-share-menu-item-icon icon-share-session-list" aria-hidden="true"></span>
									<span class="copilot-share-menu-item-text">Share All Sessions</span>
								</button>
								<button class="copilot-share-menu-item" id="importSessionBtn" type="button" role="menuitem" aria-label="Import A Session" title="Import A Session">
									<span class="copilot-share-menu-item-icon import-session-icon" aria-hidden="true"></span>
									<span class="copilot-share-menu-item-text">Import A Session</span>
								</button>
								<button class="copilot-share-menu-item" id="exportAllSessionBtn" type="button" role="menuitem" aria-label="Export All Sessions" title="Export All Sessions">
									<span class="copilot-share-menu-item-icon icon-export-all" aria-hidden="true"></span>
									<span class="copilot-share-menu-item-text">Export All Sessions</span>
								</button>
								<div class="copilot-share-menu-separator"></div>
								<button class="copilot-share-menu-item" id="copyPublicUrlMenuItem" type="button" role="menuitem">
									<span class="copilot-share-menu-item-icon icon-copy" aria-hidden="true"></span>
									<span class="copilot-share-menu-item-text" id="copyPublicUrlMenuLabel">Copy Public URL</span>
								</button>
								<button class="copilot-share-menu-item" id="openPublicUrlMenuItem" type="button" role="menuitem">
									<span class="copilot-share-menu-item-icon icon-globe" aria-hidden="true"></span>
									<span class="copilot-share-menu-item-text" id="openPublicUrlMenuLabel">Open Public URL</span>
								</button>
							</div>
						</div>
					</div>
				</div>
			</div>
			<div class="sidebar-search-bar" id="appSearchBar" hidden>
				<button class="sidebar-search-drag-handle" id="appSearchDragHandle" type="button" aria-label="Drag Search Bar" title="Drag Search Bar"></button>
				<input class="sidebar-search-input" id="appSearchInput" type="text" placeholder="Search sessions" autocomplete="off" />
				<button class="dialog-header-search-option" id="appSearchCaseBtn" type="button" aria-pressed="false" title="Match Case">Aa</button>
				<button class="dialog-header-search-option" id="appSearchWholeWordBtn" type="button" aria-pressed="false" title="Match Whole Word"><span class="search-ab-underline">ab</span></button>
				<button class="dialog-header-search-option" id="appSearchRegexBtn" type="button" aria-pressed="false" title="Use Regular Expression">.*</button>
				<button class="dialog-header-search-nav" id="appSearchPrevBtn" type="button" title="Previous Match" aria-label="Previous Match">&lt;</button>
				<span class="dialog-header-search-info" id="appSearchMatchInfo">0/0</span>
				<button class="dialog-header-search-nav" id="appSearchNextBtn" type="button" title="Next Match" aria-label="Next Match">&gt;</button>
				<button class="dialog-header-search-exit" id="closeAppSearchBtn" type="button" aria-label="Exit Search" title="Exit Search">&times;</button>
			</div>
			<ul class="session-list" id="sessionList"></ul>
		</aside>

		<main class="dialog">

			<header class="dialog-header">
				<div class="dialog-title">
					<button class="mobile-back" id="mobileBackBtn" aria-label="Back To Sessions" title="Back to Session">
						<img src="./icons/arrow-circle-left.svg" alt="Back" class="mobile-back-icon" aria-hidden="true" />
					</button>
					<div class="dialog-title-meta">
						<div class="dialog-title-row">
							<div class="dialog-title-text" id="dialogTitle">Select a session</div>
							<button class="dialog-title-summary-btn" id="dialogTitleSummaryBtn" type="button" aria-label="Open Session Summary" title="Open Session Summary">
								<span class="dialog-title-summary-icon" aria-hidden="true"></span>
							</button>
							<button class="dialog-header-summarize-btn" id="dialogHeaderSummarizeBtn" type="button" aria-label="Summarize Session Messages" title="Summarize Session Messages" hidden>
								<span class="dialog-header-summarize-icon" aria-hidden="true"></span>
							</button>
							<button class="session-summary-detach-btn" id="sessionSummaryDetachBtn" type="button" aria-label="Open Summary in Mini Window" title="Open Summary in Mini Window" hidden>
								<span class="session-summary-detach-icon" aria-hidden="true"></span>
							</button>
							<button class="session-summary-copy-btn" id="sessionSummaryCopyBtn" type="button" aria-label="Copy Summary" title="Copy Summary" hidden>
								<span class="session-summary-copy-icon" aria-hidden="true"></span>
							</button>
							<button class="session-summary-share-btn" id="sessionSummaryShareBtn" type="button" aria-label="Share Summary" title="Share Summary" hidden>
								<span class="session-summary-share-icon" aria-hidden="true"></span>
							</button>
							<button class="session-summary-clear-btn" id="sessionSummaryClearBtn" type="button" aria-label="Clear Summary" title="Clear Summary" hidden>
								<span class="session-summary-clear-icon" aria-hidden="true"></span>
							</button>
						</div>
						<div class="dialog-title-status" id="messageSelectionStatus" aria-live="polite" hidden></div>
					</div>
				</div>
				<div class="dialog-header-actions">
					<button class="dialog-header-search-btn" id="dialogHeaderSearchBtn" type="button" aria-label="Search Current Session" title="Search Current Session">
						<span class="dialog-header-search-icon" aria-hidden="true"></span>
					</button>
					<div class="dialog-header-search-bar" id="messageSearchBar" hidden>
						<input class="dialog-header-search-input" id="messageSearchInput" type="text" placeholder="Search messages" autocomplete="off" />
						<button class="dialog-header-search-option" id="messageSearchCaseBtn" type="button" aria-pressed="false" title="Match Case">Aa</button>
						<button class="dialog-header-search-option" id="messageSearchWholeWordBtn" type="button" aria-pressed="false" title="Match Whole Word"><span class="search-ab-underline">ab</span></button>
						<button class="dialog-header-search-option" id="messageSearchRegexBtn" type="button" aria-pressed="false" title="Use Regular Expression">.*</button>
						<button class="dialog-header-search-nav" id="messageSearchPrevBtn" type="button" title="Previous Match" aria-label="Previous Match">&lt;</button>
						<span class="dialog-header-search-info" id="messageSearchMatchInfo">0/0</span>
						<button class="dialog-header-search-nav" id="messageSearchNextBtn" type="button" title="Next Match" aria-label="Next Match">&gt;</button>
						<button class="dialog-header-search-exit" id="closeMessageSearchBtn" type="button" aria-label="Exit Search" title="Exit Search">&times;</button>
					</div>
					<button class="dialog-header-copy-btn" id="dialogHeaderCopyBtn" type="button" aria-label="Copy Session Messages" title="Copy Session Messages">
						<span class="dialog-header-copy-icon" aria-hidden="true"></span>
					</button>
					<button class="dialog-header-share-btn" id="dialogHeaderShareBtn" type="button" aria-label="Share Session Messages" title="Share Session Messages">
						<span class="dialog-header-share-icon" aria-hidden="true"></span>
					</button>
					<button class="dialog-header-fullscreen-btn" id="dialogHeaderFullscreenBtn" type="button" aria-label="Enter Full Screen" title="Enter Full Screen">
						<span class="dialog-header-fullscreen-icon" aria-hidden="true"></span>
					</button>
					<div class="copilot-share-menu">
						<button
							class="copilot-share-menu-trigger"
							id="dialogHeaderMenuBtn"
							type="button"
							aria-haspopup="menu"
							aria-expanded="false"
							aria-controls="dialogHeaderMenu"
							aria-label="More Actions"
							title="More Actions"
						>
							<span class="copilot-share-menu-dots" aria-hidden="true"></span>
						</button>
						<div class="copilot-share-menu-popup" id="dialogHeaderMenu" role="menu" hidden>
							<button class="copilot-share-menu-item" id="dialogHeaderExportMenuItem" type="button" role="menuitem">
								<span class="copilot-share-menu-item-icon icon-export-session" aria-hidden="true"></span>
								<span class="copilot-share-menu-item-text">Export Session</span>
							</button>
							<div class="copilot-share-menu-separator"></div>
							<button class="copilot-share-menu-item" id="clearSessionHistoryBtn" type="button" role="menuitem">
								<span class="copilot-share-menu-item-icon icon-clear-all" aria-hidden="true"></span>
								<span class="copilot-share-menu-item-text">Clear Session</span>
							</button>
							<div class="copilot-share-menu-separator"></div>
							<button class="copilot-share-menu-item" id="resetContextBtn" type="button" role="menuitem">
								<span class="copilot-share-menu-item-icon icon-reset" aria-hidden="true"></span>
								<span class="copilot-share-menu-item-text">Clear Context</span>
							</button>
						</div>
					</div>
				</div>
			</header>

			<section class="messages" id="messages">
				<div class="empty">Create or select a session to start your dialog</div>
			</section>

			<section class="session-summary-page" id="sessionSummaryPage" hidden>
				<div class="session-summary-page-body" id="sessionSummaryContent">
					<div class="session-summary-empty"></div>
				</div>
			</section>

			<div class="prompt-suggestion-popup" id="promptSuggestionPopup" role="listbox" aria-label="Similar historical prompts" hidden></div>

			<footer class="input-area">	
				<div class="input-row">
					<details class="input-hint" id="inputHintMenu">
						<summary>Input Tips</summary>
						<div class="input-hint-popover">
							<ol class="input-hint-list">
								<li><div class="input-hint-item"><kbd>Enter</kbd><span>: Send / Cancel streaming</span></div></li>
								<li><div class="input-hint-item"><kbd>Shift</kbd><span>+</span><kbd>Enter</kbd><span>: New line</span></div></li>
								<li><div class="input-hint-item"><kbd>Mouse Wheel</kbd><span>: Browse history prompts</span></div></li>
								<li><div class="input-hint-item"><kbd>Alt</kbd><span>+</span><kbd>↑</kbd><span>/</span><kbd>↓</kbd><span>: Browse history prompts</span></div></li>
							</ol>
						</div>
					</details>
					<div class="input-actions">
						<div class="model-picker" id="modelPicker">
							<button
								type="button"
								class="model-picker-trigger"
								id="modelPickerTrigger"
								aria-haspopup="listbox"
								aria-expanded="false"
								aria-controls="modelPickerPopup"
							>
								<span class="model-picker-name" id="modelPickerName">Loading models...</span>
								<span class="model-picker-chevron">▾</span>
							</button>
							<div class="model-picker-popup" id="modelPickerPopup" role="listbox" hidden></div>
							<select class="model-select model-select-native" id="modelSelect" aria-label="Select Copilot Model" tabindex="-1" aria-hidden="true">
								<option value="">Loading Copilot models...</option>
							</select>
						</div>
						<button class="send-btn" id="sendBtn" type="button">Send</button>
					</div>
				</div>
				<textarea
					id="promptInput"
					class="prompt-input"
					placeholder="Enter your request to Copilot. Press Enter or Send to submit."
				></textarea>
			</footer>
		</main>
	</div>

	<script src="./vendor/marked.umd.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/marked/marked.min.js';"></script>
	<script src="./vendor/purify.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js';"></script>
	<script src="./vendor/highlight.common.bundle.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/common.min.js';"></script>
	<script src="./vendor/jszip.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';"></script>
	<script src="./js/markdown.js"></script>
	<script src="./js/copilot-share.js"></script>
	<script src="./js/app.js"></script>
	<script src="./js/message.js"></script>
</body>
</html>
