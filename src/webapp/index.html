<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Copilot Share</title>
	<link rel="icon" href="./favicon.svg" type="image/svg+xml" />
	<link rel="stylesheet" href="./styles.css" />
	<link
		rel="stylesheet"
		href="./vendor/github-markdown.css"
		onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown.min.css';"
	/>
	<link
		rel="stylesheet"
		href="./vendor/highlight.github-dark.min.css"
		onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css';"
	/>
</head>
<body>
	<div class="app" id="app">
		<aside class="sidebar">
			<div class="server-url collapsed" id="serverUrlBox">
				<div class="server-url-header">
					<button class="server-url-toggle" id="serverUrlToggleBtn" type="button" aria-expanded="false" aria-controls="serverUrlContent">
						<div class="server-url-label">Server URLs</div>
						<div class="server-url-chevron">▾</div>
					</button>
					<button class="server-url-copy" id="copyServerUrlBtn" type="button">Copy LAN URL</button>
				</div>
				<div class="server-url-content" id="serverUrlContent">
					<div class="server-url-item">
						<div class="server-url-key">LAN URL</div>
						<div class="server-url-value" id="serverLanUrlValue">Loading...</div>
					</div>
					<div class="server-url-item">
						<div class="server-url-key">Local URL</div>
						<div class="server-url-value" id="serverLocalUrlValue">Loading...</div>
					</div>
				</div>
			</div>
			<div class="sidebar-header">
				<div class="sidebar-title">Sessions</div>
				<button class="primary-btn" id="newSessionBtn" type="button">+ New</button>
			</div>
			<div class="session-count" id="sessionCountLabel">0 sessions</div>
			<ul class="session-list" id="sessionList"></ul>
		</aside>

		<main class="dialog">
			<header class="dialog-header">
				<div class="dialog-title">
					<button class="mobile-back" id="mobileBackBtn" aria-label="Back to sessions">← Back</button>
					<div>
						<div class="dialog-title-text" id="dialogTitle">Select a session</div>
						<div class="dialog-subtitle" id="dialogSubtitle">User ↔ LLM/Agent</div>
					</div>
				</div>
			</header>

			<section class="messages" id="messages">
				<div class="empty">Create or select a session to start your dialog</div>
			</section>

			<footer class="input-area">
				<div class="input-row">
					<div class="input-hint">Enter sends. Shift+Enter adds a newline.</div>
					<button class="reset-btn" id="resetContextBtn" type="button">Reset Context</button>
					<button class="send-btn" id="sendBtn" type="button">Send</button>
				</div>
				<textarea
					id="promptInput"
					class="prompt-input"
					placeholder="Type your request to LLM/Agent..."
				></textarea>
			</footer>
		</main>
	</div>

	<script src="./vendor/marked.umd.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/marked/marked.min.js';"></script>
	<script src="./vendor/purify.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js';"></script>
	<script src="./vendor/highlight.common.bundle.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/common.min.js';"></script>
	<script src="./app.js"></script>
	<script src="./message.js"></script>
</body>
</html>
